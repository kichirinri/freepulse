<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號設定 · 熱讀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/index.css?v=6">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>

<!-- TOP BAR -->
<div class="settings-bar">
    <a class="settings-bar-logo" href="index.html">熱讀</a>
    <button class="settings-bar-back" onclick="window.history.back()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        返回
    </button>
</div>

<!-- 未登入提示 -->
<div class="no-login" id="noLogin">
    <div style="font-size:48px;margin-bottom:16px;">🔒</div>
    <div style="font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:8px;">請先登入</div>
    <div style="font-size:14px;color:var(--ink4);margin-bottom:24px;">登入後才能管理帳號設定</div>
    <button style="background:var(--ink);color:white;border:none;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;" onclick="window.location.href='index.html'">返回首頁登入</button>
</div>

<!-- 主版面 -->
<div class="settings-layout" id="mainLayout" style="display:none;">

    <!-- 左側導航 -->
    <div class="settings-nav">
        <div class="settings-nav-title">設定</div>
        <div class="settings-nav-item active" onclick="switchTab('Profile', this)">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            個人資料
        </div>
        <div class="settings-nav-item" onclick="switchTab('Penname', this)">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            筆名管理
        </div>
        <div class="settings-nav-item" onclick="switchTab('Password', this)">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            修改密碼
        </div>
    </div>

    <!-- 右側內容 -->
    <div class="settings-content">

        <!-- 個人資料 -->
        <div class="settings-section active" id="tabProfile">
            <div class="settings-section-title">個人資料</div>
            <div class="settings-section-sub">管理你的頭像與顯示名稱</div>
            <div class="avatar-section">
                <div class="avatar-preview" id="avatarPreview">
                    <span id="avatarInitial">文</span>
                    <img id="avatarImg" src="" alt="">
                </div>
                <div class="avatar-actions">
                    <div class="avatar-actions-title">頭像</div>
                    <div class="avatar-actions-sub">支援 JPG、PNG，最大 5MB</div>
                    <button class="btn-avatar-upload" onclick="document.getElementById('avatarInput').click()">上傳圖片</button>
                    <button class="btn-avatar-remove" id="btnAvatarRemove" onclick="removeAvatar()">移除頭像</button>
                </div>
                <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="openCropModal(event)">
            </div>
            <div class="settings-field">
                <label class="settings-label">暱稱（顯示名稱）</label>
                <input class="settings-input" id="inputName" type="text" placeholder="你的名字" maxlength="20">
                <div class="settings-hint">修改後，已發表文章的署名也會同步更新</div>
                <div class="settings-error" id="nameError"></div>
            </div>
            <div class="settings-field">
                <label class="settings-label">帳戶名稱（電子郵件）</label>
                <input class="settings-input" id="inputEmail" type="email" disabled>
                <div class="settings-hint">帳戶名稱無法修改</div>
            </div>
            <button class="btn-settings-save" onclick="saveProfile()">儲存變更</button>
            <div class="settings-success" id="profileSuccess"></div>
        </div>

        <!-- 筆名管理 -->
        <div class="settings-section" id="tabPenname">
            <div class="settings-section-title">筆名管理</div>
            <div class="settings-section-sub">最多可建立 5 個筆名，發文時可選擇署名</div>
            <div class="penname-list" id="pennameList"></div>
            <div class="penname-add-form" id="pennameAddForm" style="display:none;">
                <div class="penname-add-title">新增筆名</div>
                <div class="penname-add-row">
                    <div>
                        <label class="settings-label">筆名</label>
                        <input class="settings-input" id="inputPenname" type="text" placeholder="例如：南風以南" maxlength="20">
                    </div>
                    <div>
                        <label class="settings-label">備註（選填）</label>
                        <input class="settings-input" id="inputPennameNote" type="text" placeholder="例如：散文專用" maxlength="20">
                    </div>
                </div>
                <div class="settings-error" id="pennameError"></div>
                <div style="display:flex;gap:10px;margin-top:4px;">
                    <button class="btn-penname-add" onclick="addPenname()">新增</button>
                    <button class="btn-penname-add-cancel" onclick="hidePennameForm()">取消</button>
                </div>
            </div>
            <button class="btn-penname-new" id="btnPennameNew" onclick="showPennameForm()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新增筆名
            </button>
            <div class="penname-limit" id="pennameLimit"></div>
        </div>

        <!-- 修改密碼 -->
        <div class="settings-section" id="tabPassword">
            <div class="settings-section-title">修改密碼</div>
            <div class="settings-section-sub">為了安全，請先輸入目前密碼</div>
            <div class="settings-field">
                <label class="settings-label">目前密碼</label>
                <input class="settings-input" id="inputOldPwd" type="password" placeholder="輸入目前密碼">
            </div>
            <div class="settings-field">
                <label class="settings-label">新密碼</label>
                <input class="settings-input" id="inputNewPwd" type="password" placeholder="至少8位數">
            </div>
            <div class="settings-field">
                <label class="settings-label">確認新密碼</label>
                <input class="settings-input" id="inputConfirmPwd" type="password" placeholder="再次輸入新密碼">
            </div>
            <div class="settings-error" id="pwdError"></div>
            <div class="settings-success" id="pwdSuccess"></div>
            <button class="btn-settings-save" onclick="savePassword()">更新密碼</button>
        </div>

    </div>
</div>

<!-- 裁剪彈窗 -->
<div class="crop-overlay" id="cropOverlay">
    <div class="crop-box">
        <div class="crop-title">調整頭像</div>
        <div class="crop-sub">拖動圖片移動位置，滑動調整大小</div>
        <div class="crop-canvas-wrap">
            <canvas id="cropCanvas" width="400" height="320"></canvas>
            <svg class="crop-mask" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <mask id="holeMask">
                        <rect width="400" height="320" fill="white"/>
                        <circle cx="200" cy="160" r="120" fill="black"/>
                    </mask>
                </defs>
                <rect width="400" height="320" fill="rgba(0,0,0,0.55)" mask="url(#holeMask)"/>
                <circle cx="200" cy="160" r="120" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
            </svg>
        </div>
        <div class="crop-controls">
            <label>縮放</label>
            <input type="range" class="crop-slider" id="cropScale" min="50" max="300" value="100">
        </div>
        <div class="crop-actions">
            <button class="btn-crop-cancel" onclick="closeCropModal()">取消</button>
            <button class="btn-crop-confirm" onclick="confirmCrop()">確認使用</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/settings.js"></script>
<script src="js/common.js"></script>
</body>
</html>
