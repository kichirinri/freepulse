<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 · Scribe writing go</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:      #111111;
  --ink2:     #333333;
  --ink3:     #666666;
  --ink4:     #999999;
  --rule:     #d0c9c0;
  --rule-lt:  #e8e4df;
  --bg:       #ffffff;
  --bg2:      #f8f6f3;
  --accent:   #c0392b;
  --accent2:  #e8622a;
  --serif:    'Playfair Display', 'Noto Serif TC', 'Songti SC', Georgia, serif;
  --sans:     'Lato', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  --serif-zh: 'Noto Serif TC', 'Songti SC', Georgia, serif;
}

html { font-size: 16px; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; }
button { cursor: pointer; font-family: var(--sans); }
a { text-decoration: none; color: inherit; }

/* 禁止读者复制（作者登入后解除） */
body.no-copy {
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
}

/* TOP BAR */
.art-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 54px;
}
.art-bar-logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--ink);
}
.art-bar-right { display: flex; align-items: center; gap: 12px; }

.btn-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink3);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  border-radius: 2px;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn-bar:hover { border-color: var(--ink); color: var(--ink); }
.btn-bar.danger { color: var(--accent); border-color: #f5c0b8; }
.btn-bar.danger:hover { background: var(--accent); color: white; border-color: var(--accent); }
.btn-bar.primary { background: var(--ink); color: white; border-color: var(--ink); }
.btn-bar.primary:hover { background: var(--ink2); }

/* AUTHOR TOOLBAR — 只对作者显示 */
.author-toolbar {
  display: none;
  background: #fffbf5;
  border-bottom: 1px solid #fde8c8;
  padding: 10px 40px;
  gap: 10px;
  align-items: center;
  font-size: 13px;
  color: var(--ink3);
}
.author-toolbar.show { display: flex; }
.author-toolbar-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  color: #f59e0b;
  margin-right: 4px;
}

/* ARTICLE LAYOUT */
.art-container {
  max-width: 740px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

/* COVER */
.art-cover {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: none;
  margin-bottom: 36px;
}
.art-cover.show { display: block; }

/* META */
.art-meta-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.art-cat-badge {
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 3px 10px;
  border-radius: 1px;
}
.art-cat-badge.fire { color: var(--accent2); border-color: var(--accent2); }
.art-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.art-tag {
  font-size: 11px;
  color: var(--ink4);
  background: var(--bg2);
  border: 1px solid var(--rule-lt);
  padding: 2px 8px;
  border-radius: 1px;
}

/* TITLE */
.art-title {
  font-family: var(--serif);
  font-size: 40px;
  font-weight: 900;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 20px;
}

/* BYLINE */
.art-byline {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  border-top: 1px solid var(--rule-lt);
  border-bottom: 1px solid var(--rule-lt);
  margin-bottom: 36px;
}
.art-author-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--ink);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 900;
  flex-shrink: 0;
}
.art-author-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.art-publish-date { font-size: 12px; color: var(--ink4); }
.art-read-time { font-size: 12px; color: var(--ink4); }

/* BODY */
.art-body {
  font-family: var(--serif-zh);
  font-size: 18px;
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink2);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ARTICLE FOOTER */
.art-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.like-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink3);
  padding: 10px 20px;
  font-size: 14px;
  border-radius: 2px;
  transition: all 0.15s;
}
.like-btn:hover { border-color: var(--accent); color: var(--accent); }
.like-btn.liked { background: #fff0ef; border-color: var(--accent); color: var(--accent); }

.art-copyright {
  font-size: 11px;
  color: var(--ink4);
  line-height: 1.6;
  text-align: right;
}

/* PDF WATERMARK DIALOG */
.dialog-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.dialog-overlay.open { display: flex; }

.dialog-box {
  background: white;
  width: 420px;
  max-width: 94vw;
  border-top: 3px solid var(--ink);
  animation: slideUp 0.2s ease;
  padding: 28px;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.dialog-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.dialog-sub { font-size: 13px; color: var(--ink3); margin-bottom: 20px; line-height: 1.6; }

.wm-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.15s;
}
.wm-option:hover { border-color: var(--ink3); }
.wm-option.selected { border-color: var(--ink); background: var(--bg2); }
.wm-option input[type="radio"] { margin-top: 3px; flex-shrink: 0; accent-color: var(--ink); }
.wm-option-label { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.wm-option-desc { font-size: 12px; color: var(--ink4); line-height: 1.5; }

.dialog-preview {
  background: var(--bg2);
  border: 1px solid var(--rule-lt);
  padding: 12px 16px;
  font-size: 12px;
  color: var(--ink3);
  margin: 12px 0 20px;
  line-height: 1.7;
}
.dialog-preview strong { color: var(--ink2); }

.dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-dialog-cancel { background: none; border: 1px solid var(--rule); color: var(--ink3); padding: 9px 18px; font-size: 13px; font-weight: 700; border-radius: 2px; transition: all 0.15s; }
.btn-dialog-cancel:hover { border-color: var(--ink); color: var(--ink); }
.btn-dialog-confirm { background: var(--ink); color: white; border: none; padding: 9px 20px; font-size: 13px; font-weight: 700; border-radius: 2px; transition: background 0.15s; }
.btn-dialog-confirm:hover { background: var(--ink2); }

/* DELETE CONFIRM DIALOG */
.delete-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.delete-dialog.open { display: flex; }
.delete-box {
  background: white;
  width: 380px;
  max-width: 94vw;
  border-top: 3px solid var(--accent);
  padding: 28px;
  animation: slideUp 0.2s ease;
}
.delete-title { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.delete-sub { font-size: 13px; color: var(--ink3); margin-bottom: 24px; line-height: 1.6; }
.delete-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-delete-cancel { background: none; border: 1px solid var(--rule); color: var(--ink3); padding: 9px 18px; font-size: 13px; font-weight: 700; border-radius: 2px; transition: all 0.15s; }
.btn-delete-cancel:hover { border-color: var(--ink); color: var(--ink); }
.btn-delete-confirm { background: var(--accent); color: white; border: none; padding: 9px 20px; font-size: 13px; font-weight: 700; border-radius: 2px; transition: background 0.15s; }
.btn-delete-confirm:hover { background: #a93226; }

/* COPY BLOCKED TOAST */
.copy-block-toast {
  display: none;
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink2);
  color: white;
  padding: 10px 24px;
  font-size: 13px;
  z-index: 9999;
  white-space: nowrap;
  animation: toastIn 0.2s ease;
}
.copy-block-toast.show { display: block; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* TOAST */
.toast {
  display: none;
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 12px 28px;
  font-size: 14px;
  z-index: 9999;
  white-space: nowrap;
  animation: toastIn 0.2s ease;
}
.toast.show { display: block; }

/* NOT FOUND */
.not-found {
  text-align: center;
  padding: 120px 40px;
  display: none;
}
.not-found.show { display: block; }
.not-found h2 { font-family: var(--serif); font-size: 32px; margin-bottom: 12px; }
.not-found p { color: var(--ink3); margin-bottom: 24px; }
.btn-home { background: var(--ink); color: white; border: none; padding: 10px 24px; font-size: 13px; font-weight: 700; border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="art-bar">
  <a class="art-bar-logo" href="wenhui.html">Scribe </a>
  <div class="art-bar-right">
    <button class="btn-bar" onclick="window.location.href='wenhui.html'">
      ← 返回首頁
    </button>
  </div>
</div>

<!-- AUTHOR TOOLBAR -->
<div class="author-toolbar" id="authorToolbar">
  <span class="author-toolbar-label">作者</span>
  <span style="color:var(--ink3);font-size:13px;">這是你的文章，你擁有完整操作權限</span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn-bar" onclick="copyArticle()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      複製文章
    </button>
    <button class="btn-bar" onclick="openPdfDialog()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      下載 PDF
    </button>
    <button class="btn-bar danger" onclick="openDeleteDialog()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      刪除文章
    </button>
  </div>
</div>

<!-- ARTICLE -->
<div class="art-container" id="artContainer">
  <img class="art-cover" id="artCover" src="" alt="">

  <div class="art-meta-top">
    <span class="art-cat-badge" id="artCat"></span>
    <div class="art-tags" id="artTags"></div>
  </div>

  <h1 class="art-title" id="artTitle"></h1>

  <div class="art-byline">
    <div class="art-author-avatar" id="artAuthorAvatar"></div>
    <div>
      <div class="art-author-name" id="artAuthorName"></div>
      <div style="display:flex;gap:12px;margin-top:2px;">
        <span class="art-publish-date" id="artDate"></span>
        <span class="art-read-time" id="artReadTime"></span>
      </div>
    </div>
  </div>

  <div class="art-body" id="artBody"></div>

  <div class="art-footer">
    <button class="like-btn" id="likeBtn" onclick="toggleLike()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
      <span id="likeCount">0</span> 讚
    </button>
    <div class="art-copyright" id="artCopyright"></div>
  </div>
</div>

<!-- NOT FOUND -->
<div class="not-found" id="notFound">
  <h2>找不到這篇文章</h2>
  <p>文章可能已被刪除或連結有誤</p>
  <button class="btn-home" onclick="window.location.href='wenhui.html'">返回首頁</button>
</div>

<!-- PDF WATERMARK DIALOG -->
<div class="dialog-overlay" id="pdfDialog" onclick="closePdfOnOverlay(event)">
  <div class="dialog-box">
    <div class="dialog-title">下載 PDF</div>
    <div class="dialog-sub">選擇是否在 PDF 中加入水印，水印內容為你的署名與文章連結。</div>

    <div class="wm-option selected" id="wmOpt1" onclick="selectWm('yes')">
      <input type="radio" name="wm" id="wmYes" checked>
      <div>
        <div class="wm-option-label">加入水印</div>
        <div class="wm-option-desc">PDF 每頁底部將顯示你的署名與文章連結，保護原創版權。</div>
      </div>
    </div>

    <div class="wm-option" id="wmOpt2" onclick="selectWm('no')">
      <input type="radio" name="wm" id="wmNo">
      <div>
        <div class="wm-option-label">不加水印</div>
        <div class="wm-option-desc">下載純文字 PDF，不含任何版權標記。</div>
      </div>
    </div>

    <div class="dialog-preview" id="wmPreview">
      水印預覽：<strong id="wmPreviewText"></strong>
    </div>

    <div class="dialog-actions">
      <button class="btn-dialog-cancel" onclick="closePdfDialog()">取消</button>
      <button class="btn-dialog-confirm" onclick="downloadPDF()">確認下載</button>
    </div>
  </div>
</div>

<!-- DELETE DIALOG -->
<div class="delete-dialog" id="deleteDialog" onclick="closeDeleteOnOverlay(event)">
  <div class="delete-box">
    <div class="delete-title">刪除文章</div>
    <div class="delete-sub">確定要刪除這篇文章嗎？此操作無法復原，文章將永久消失。</div>
    <div class="delete-actions">
      <button class="btn-delete-cancel" onclick="closeDeleteDialog()">取消</button>
      <button class="btn-delete-confirm" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="copy-block-toast" id="copyBlockToast">🚫 文章內容受版權保護，不允許複製</div>
<div class="toast" id="toast"></div>

<script>
/* ── 读取文章 ── */
const params = new URLSearchParams(location.search);
const articleId = parseInt(params.get('id'));
const articles = JSON.parse(localStorage.getItem('wh_articles') || '[]');
const article = articles.find(a => a.id === articleId);
const currentUser = JSON.parse(sessionStorage.getItem('wh_user') || 'null');
const isAuthor = article && currentUser && currentUser.email === article.email;

if (!article) {
  document.getElementById('artContainer').style.display = 'none';
  document.getElementById('notFound').classList.add('show');
} else {
  renderArticle();
}

function renderArticle() {
  document.title = article.title + ' · Scribe writing go';

  /* 封面 */
  if (article.cover) {
    const img = document.getElementById('artCover');
    img.src = article.cover;
    img.classList.add('show');
  }

  /* 分类 */
  const catEl = document.getElementById('artCat');
  catEl.textContent = article.cat;
  if (article.cat === '煙火飄香') catEl.classList.add('fire');

  /* 标签 */
  const tagsEl = document.getElementById('artTags');
  (article.tags || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'art-tag';
    span.textContent = '#' + t;
    tagsEl.appendChild(span);
  });

  /* 标题 */
  document.getElementById('artTitle').textContent = article.title;

  /* 作者 */
  const initial = (article.author || '文')[0].toUpperCase();
  document.getElementById('artAuthorAvatar').textContent = initial;
  document.getElementById('artAuthorName').textContent = article.author;

  /* 日期 */
  const date = new Date(article.publishedAt);
  document.getElementById('artDate').textContent =
    date.getFullYear() + '年' + (date.getMonth()+1) + '月' + date.getDate() + '日';

  /* 阅读时间 */
  const words = article.body.replace(/\s/g,'').length;
  const mins = Math.max(1, Math.round(words / 300));
  document.getElementById('artReadTime').textContent = '約 ' + mins + ' 分鐘閱讀';

  /* 正文 */
  document.getElementById('artBody').textContent = article.body;

  /* 点赞 */
  document.getElementById('likeCount').textContent = article.likes || 0;
  const likedKey = 'liked_' + article.id;
  if (localStorage.getItem(likedKey)) {
    document.getElementById('likeBtn').classList.add('liked');
  }

  /* 版权 */
  const url = location.href;
  document.getElementById('artCopyright').innerHTML =
    '© ' + article.author + ' · Scribe writing go<br>' +
    '<span style="font-size:10px;word-break:break-all;">' + url + '</span>';

  /* 水印预览 */
  document.getElementById('wmPreviewText').textContent =
    '© ' + article.author + ' · ' + url;

  /* 作者工具栏 */
  if (isAuthor) {
    document.getElementById('authorToolbar').classList.add('show');
  }

  /* 禁止读者复制 */
  if (!isAuthor) {
    document.body.classList.add('no-copy');
  }
}

/* ── 点赞 ── */
function toggleLike() {
  if (!article) return;
  const key = 'liked_' + article.id;
  const btn = document.getElementById('likeBtn');
  const idx = articles.findIndex(a => a.id === article.id);
  if (idx === -1) return;

  if (localStorage.getItem(key)) {
    articles[idx].likes = Math.max(0, (articles[idx].likes || 0) - 1);
    localStorage.removeItem(key);
    btn.classList.remove('liked');
  } else {
    articles[idx].likes = (articles[idx].likes || 0) + 1;
    localStorage.setItem(key, '1');
    btn.classList.add('liked');
  }
  document.getElementById('likeCount').textContent = articles[idx].likes;
  localStorage.setItem('wh_articles', JSON.stringify(articles));
}

/* ── 复制文章（仅作者）── */
function copyArticle() {
  if (!isAuthor) return;
  const text = article.title + '\n\n' + article.body;
  navigator.clipboard.writeText(text).then(() => {
    showToast('文章內容已複製到剪貼板 ✓');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('文章內容已複製到剪貼板 ✓');
  });
}

/* ── 读者复制拦截 ── */
document.addEventListener('copy', function(e) {
  if (!isAuthor) {
    e.preventDefault();
    showCopyBlock();
  }
});
document.addEventListener('contextmenu', function(e) {
  if (!isAuthor) {
    e.preventDefault();
    showCopyBlock();
  }
});
function showCopyBlock() {
  const t = document.getElementById('copyBlockToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);

/* ── PDF 下载对话框 ── */
let wmChoice = 'yes';

function openPdfDialog() {
  document.getElementById('pdfDialog').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePdfDialog() {
  document.getElementById('pdfDialog').classList.remove('open');
  document.body.style.overflow = '';
}
function closePdfOnOverlay(e) {
  if (e.target.id === 'pdfDialog') closePdfDialog();
}
function selectWm(choice) {
  wmChoice = choice;
  document.getElementById('wmOpt1').classList.toggle('selected', choice === 'yes');
  document.getElementById('wmOpt2').classList.toggle('selected', choice === 'no');
  document.getElementById('wmYes').checked = choice === 'yes';
  document.getElementById('wmNo').checked  = choice === 'no';
  document.getElementById('wmPreview').style.display = choice === 'yes' ? 'block' : 'none';
}

/* ── PDF 下载（使用 jsPDF）── */
function downloadPDF() {
  if (!article) return;
  closePdfDialog();
  showToast('PDF 生成中，請稍候…');

  setTimeout(() => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 20;
      const contentW = pageW - margin * 2;
      let y = margin;

      /* 标题 */
      doc.setFontSize(22);
      doc.setFont('helvetica', 'bold');
      const titleLines = doc.splitTextToSize(article.title, contentW);
      doc.text(titleLines, margin, y);
      y += titleLines.length * 10 + 6;

      /* 分类 + 作者 + 日期 */
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(150);
      const date = new Date(article.publishedAt);
      const metaLine = article.cat + '  ·  ' + article.author + '  ·  ' +
        date.getFullYear() + '/' + (date.getMonth()+1) + '/' + date.getDate();
      doc.text(metaLine, margin, y);
      y += 6;

      /* 分隔线 */
      doc.setDrawColor(200);
      doc.line(margin, y, pageW - margin, y);
      y += 8;

      /* 正文 */
      doc.setFontSize(12);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(40);
      const bodyLines = doc.splitTextToSize(article.body, contentW);

      bodyLines.forEach(line => {
        if (y > pageH - (wmChoice === 'yes' ? 20 : 15)) {
          /* 水印 */
          if (wmChoice === 'yes') addWatermark(doc, pageW, pageH, margin);
          doc.addPage();
          y = margin;
        }
        doc.text(line, margin, y);
        y += 7;
      });

      /* 最后一页水印 */
      if (wmChoice === 'yes') addWatermark(doc, pageW, pageH, margin);

      /* 下载 */
      const filename = article.title.slice(0, 20).replace(/[^\w\u4e00-\u9fa5]/g, '_') + '.pdf';
      doc.save(filename);
      showToast('PDF 下載成功 ✓');
    } catch(err) {
      showToast('PDF 生成失敗，請重試');
      console.error(err);
    }
  }, 300);
}

function addWatermark(doc, pageW, pageH, margin) {
  const url = location.href;
  const wmText = '© ' + article.author + ' · ' + url;
  doc.setFontSize(8);
  doc.setFont('helvetica', 'italic');
  doc.setTextColor(180);
  const lines = doc.splitTextToSize(wmText, pageW - margin * 2);
  doc.text(lines, margin, pageH - 10);
  /* 顶部细线 */
  doc.setDrawColor(220);
  doc.line(margin, pageH - 14, pageW - margin, pageH - 14);
}

/* ── 删除文章 ── */
function openDeleteDialog() {
  document.getElementById('deleteDialog').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDeleteDialog() {
  document.getElementById('deleteDialog').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDeleteOnOverlay(e) {
  if (e.target.id === 'deleteDialog') closeDeleteDialog();
}
function confirmDelete() {
  const idx = articles.findIndex(a => a.id === article.id);
  if (idx !== -1) {
    articles.splice(idx, 1);
    localStorage.setItem('wh_articles', JSON.stringify(articles));
  }
  closeDeleteDialog();
  showToast('文章已刪除，即將返回首頁…');
  setTimeout(() => { window.location.href = 'wenhui.html'; }, 2000);
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
