<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的文章 · Scribe writing go</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --ink:#111111; --ink2:#333333; --ink3:#666666; --ink4:#999999;
  --rule:#d0c9c0; --rule-lt:#e8e4df; --bg:#ffffff; --bg2:#f8f6f3;
  --accent:#c0392b; --accent2:#e8622a;
  --serif:'Playfair Display','Noto Serif TC','Songti SC',Georgia,serif;
  --sans:'Lato','Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
}
html { font-size:16px; }
body { font-family:var(--sans); background:var(--bg); color:var(--ink); }
button { cursor:pointer; font-family:var(--sans); }
a { text-decoration:none; color:inherit; }

/* TOP BAR */
.top-bar {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.97); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--rule);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 40px; height:54px;
}
.top-bar-logo { font-family:var(--serif); font-size:20px; font-weight:900; letter-spacing:3px; color:var(--ink); }
.btn-back { background:none; border:1px solid var(--rule); color:var(--ink3); padding:6px 14px; font-size:12px; font-weight:700; border-radius:2px; transition:all 0.15s; }
.btn-back:hover { border-color:var(--ink); color:var(--ink); }
.btn-write { background:var(--ink); color:white; border:none; padding:7px 16px; font-size:12px; font-weight:700; border-radius:2px; letter-spacing:0.5px; transition:background 0.15s; }
.btn-write:hover { background:var(--ink2); }

/* PAGE */
.page { max-width:860px; margin:0 auto; padding:40px 40px 80px; }

.page-header { margin-bottom:32px; }
.page-title { font-family:var(--serif); font-size:32px; font-weight:900; color:var(--ink); margin-bottom:6px; }
.page-sub { font-size:14px; color:var(--ink4); }

/* STATS ROW */
.stats-row { display:flex; gap:24px; margin-bottom:32px; }
.stat-card { background:var(--bg2); border:1px solid var(--rule-lt); padding:16px 20px; flex:1; border-radius:2px; }
.stat-num { font-family:var(--serif); font-size:28px; font-weight:900; color:var(--ink); }
.stat-label { font-size:12px; color:var(--ink4); margin-top:2px; letter-spacing:0.5px; }

/* FILTER TABS */
.filter-tabs { display:flex; border-bottom:1px solid var(--rule); margin-bottom:24px; }
.filter-tab { padding:10px 16px; font-size:13px; color:var(--ink4); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; font-weight:700; letter-spacing:0.5px; }
.filter-tab:hover { color:var(--ink); }
.filter-tab.active { color:var(--ink); border-bottom-color:var(--ink); }

/* ARTICLE LIST */
.article-list { display:flex; flex-direction:column; gap:0; }

.article-row {
  display:flex; align-items:flex-start; gap:20px;
  padding:20px 0; border-bottom:1px solid var(--rule-lt);
  cursor:pointer; transition:opacity 0.15s;
}
.article-row:hover { opacity:0.8; }
.article-row:last-child { border-bottom:none; }

.article-row-cover {
  width:100px; height:68px; object-fit:cover; flex-shrink:0;
  background:var(--bg2); display:flex; align-items:center; justify-content:center;
  font-size:24px; border-radius:2px; overflow:hidden;
}
.article-row-cover img { width:100%; height:100%; object-fit:cover; display:none; }
.article-row-cover img.show { display:block; }

.article-row-body { flex:1; min-width:0; }
.article-row-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.article-row-cat {
  font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:700;
  color:var(--accent); border:1px solid var(--accent); padding:2px 7px; border-radius:1px;
}
.article-row-cat.fire { color:var(--accent2); border-color:var(--accent2); }
.article-row-date { font-size:12px; color:var(--ink4); }
.article-row-title { font-family:var(--serif); font-size:18px; font-weight:700; color:var(--ink); line-height:1.35; margin-bottom:6px; }
.article-row-excerpt { font-size:13px; color:var(--ink3); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.6; }
.article-row-stats { display:flex; align-items:center; gap:12px; margin-top:8px; font-size:12px; color:var(--ink4); }

.article-row-actions { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
.btn-article-action {
  background:none; border:1px solid var(--rule); color:var(--ink3);
  padding:5px 12px; font-size:11px; font-weight:700; border-radius:2px;
  transition:all 0.15s; white-space:nowrap;
}
.btn-article-action:hover { border-color:var(--ink3); color:var(--ink); }
.btn-article-action.delete { color:var(--accent); border-color:#f5c0b8; }
.btn-article-action.delete:hover { background:var(--accent); color:white; border-color:var(--accent); }

/* EMPTY STATE */
.empty-state { text-align:center; padding:80px 40px; display:none; }
.empty-state.show { display:block; }
.empty-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
.empty-title { font-family:var(--serif); font-size:22px; font-weight:700; color:var(--ink); margin-bottom:8px; }
.empty-sub { font-size:14px; color:var(--ink4); margin-bottom:24px; }
.btn-empty-write { background:var(--ink); color:white; border:none; padding:10px 24px; font-size:13px; font-weight:700; border-radius:2px; }

/* DELETE DIALOG */
.delete-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
.delete-overlay.open { display:flex; }
.delete-box { background:white; width:380px; max-width:94vw; border-top:3px solid var(--accent); padding:28px; animation:slideUp 0.2s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.delete-title { font-family:var(--serif); font-size:20px; font-weight:700; color:var(--accent); margin-bottom:10px; }
.delete-sub { font-size:13px; color:var(--ink3); margin-bottom:24px; line-height:1.6; }
.delete-actions { display:flex; gap:10px; justify-content:flex-end; }
.btn-del-cancel { background:none; border:1px solid var(--rule); color:var(--ink3); padding:9px 18px; font-size:13px; font-weight:700; border-radius:2px; transition:all 0.15s; }
.btn-del-cancel:hover { border-color:var(--ink); color:var(--ink); }
.btn-del-confirm { background:var(--accent); color:white; border:none; padding:9px 20px; font-size:13px; font-weight:700; border-radius:2px; }
.btn-del-confirm:hover { background:#a93226; }

/* TOAST */
.toast { display:none; position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:12px 28px; font-size:14px; z-index:9999; white-space:nowrap; }
.toast.show { display:block; }

/* NO LOGIN */
.no-login { text-align:center; padding:120px 40px; display:none; }
.no-login.show { display:block; }
</style>
</head>
<body>

<div class="top-bar">
  <a class="top-bar-logo" href="wenhui.html">Scribe</a>
  <div style="display:flex;gap:10px;">
    <button class="btn-back" onclick="window.location.href='wenhui.html'">← 返回首頁</button>
    <button class="btn-write" onclick="window.location.href='write.html'">＋ 發新文章</button>
  </div>
</div>

<!-- 未登入提示 -->
<div class="no-login" id="noLogin">
  <div style="font-size:48px;margin-bottom:16px;">🔒</div>
  <div style="font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:8px;">請先登入</div>
  <div style="font-size:14px;color:var(--ink4);margin-bottom:24px;">登入後才能查看你的文章</div>
  <button style="background:var(--ink);color:white;border:none;padding:10px 24px;font-size:13px;font-weight:700;border-radius:2px;" onclick="window.location.href='wenhui.html'">返回首頁登入</button>
</div>

<div class="page" id="mainPage" style="display:none;">
  <div class="page-header">
    <div class="page-title">我的文章</div>
    <div class="page-sub" id="pageSubText"></div>
  </div>

  <!-- 统计 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">已發表文章</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statLikes">0</div>
      <div class="stat-label">累計獲讚</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statWords">0</div>
      <div class="stat-label">累計字數</div>
    </div>
  </div>

  <!-- 筛选 -->
  <div class="filter-tabs" id="filterTabs">
    <div class="filter-tab active" onclick="filterArticles('all', this)">全部</div>
  </div>

  <!-- 文章列表 -->
  <div class="article-list" id="articleList"></div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">✍️</div>
    <div class="empty-title">還沒有文章</div>
    <div class="empty-sub">開始寫作，讓你的聲音傳遍世界每個角落</div>
    <button class="btn-empty-write" onclick="window.location.href='write.html'">寫第一篇文章</button>
  </div>
</div>

<!-- 删除确认 -->
<div class="delete-overlay" id="deleteOverlay" onclick="closeDeleteOnOverlay(event)">
  <div class="delete-box">
    <div class="delete-title">刪除文章</div>
    <div class="delete-sub">確定要刪除「<span id="deleteTargetTitle"></span>」？此操作無法復原。</div>
    <div class="delete-actions">
      <button class="btn-del-cancel" onclick="closeDelete()">取消</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const currentUser = JSON.parse(sessionStorage.getItem('wh_user') || 'null');

if (!currentUser) {
  document.getElementById('noLogin').classList.add('show');
} else {
  document.getElementById('mainPage').style.display = 'block';
  document.getElementById('pageSubText').textContent = currentUser.name + ' 的創作空間';
  loadArticles();
}

let allMyArticles = [];
let deleteTargetId = null;

function loadArticles() {
  const all = JSON.parse(localStorage.getItem('wh_articles') || '[]');
  allMyArticles = all.filter(a => a.email === currentUser.email || a.author === currentUser.name);

  /* 统计 */
  const totalLikes = allMyArticles.reduce((s, a) => s + (a.likes || 0), 0);
  const totalWords = allMyArticles.reduce((s, a) => s + (a.body || '').replace(/\s/g,'').length, 0);
  document.getElementById('statTotal').textContent = allMyArticles.length;
  document.getElementById('statLikes').textContent = totalLikes;
  document.getElementById('statWords').textContent = totalWords > 9999 ?
    (totalWords/10000).toFixed(1) + '萬' : totalWords;

   /* 动态生成分类Tab */
const tabs = document.getElementById('filterTabs');
const cats = [...new Set(allMyArticles.map(a => a.cat))];
// 清除旧Tab（保留「全部」）
tabs.innerHTML = '<div class="filter-tab active" onclick="filterArticles(\'all\', this)">全部</div>';
cats.forEach(cat => {
  const tab = document.createElement('div');
  tab.className = 'filter-tab';
  tab.textContent = cat;
  tab.onclick = function() { filterArticles(cat, this); };
  tabs.appendChild(tab);
});

  renderList(allMyArticles);
}

function filterArticles(cat, tabEl) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  if (cat === 'all') {
    renderList(allMyArticles);
  } else if (cat === 'other') {
    const mainCats = ['社會','煙火飄香','哲學','歷史'];
    renderList(allMyArticles.filter(a => !mainCats.includes(a.cat)));
  } else {
    renderList(allMyArticles.filter(a => a.cat === cat));
  }
}

function renderList(articles) {
  const list = document.getElementById('articleList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  if (!articles.length) {
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  articles.forEach(a => {
    const date = new Date(a.publishedAt);
    const dateStr = date.getFullYear() + '年' + (date.getMonth()+1) + '月' + date.getDate() + '日';
    const words = (a.body || '').replace(/\s/g,'').length;
    const excerpt = (a.body || '').slice(0, 80);
    const isFire = a.cat === '煙火飄香';

    const row = document.createElement('div');
    row.className = 'article-row';
    row.innerHTML = `
      <div class="article-row-cover">
        <img src="${a.cover || ''}" class="${a.cover ? 'show' : ''}">
        ${!a.cover ? '📄' : ''}
      </div>
      <div class="article-row-body">
        <div class="article-row-meta">
          <span class="article-row-cat ${isFire ? 'fire' : ''}">${a.cat}</span>
          <span class="article-row-date">${dateStr}</span>
        </div>
        <div class="article-row-title">${a.title}</div>
        <div class="article-row-excerpt">${excerpt}…</div>
        <div class="article-row-stats">
          <span>👍 ${a.likes || 0}</span>
          <span>${words} 字</span>
          ${(a.tags||[]).map(t => `<span>#${t}</span>`).join('')}
        </div>
      </div>
      <div class="article-row-actions" onclick="event.stopPropagation()">
        <button class="btn-article-action" onclick="viewArticle(${a.id})">查看</button>
        <button class="btn-article-action delete" onclick="openDelete(${a.id}, '${a.title.replace(/'/g,"\\'")}')">刪除</button>
      </div>
    `;
    row.addEventListener('click', () => viewArticle(a.id));
    list.appendChild(row);
  });
}

function viewArticle(id) {
  window.location.href = 'article.html?id=' + id;
}

/* 删除 */
function openDelete(id, title) {
  deleteTargetId = id;
  document.getElementById('deleteTargetTitle').textContent = title;
  document.getElementById('deleteOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDelete() {
  document.getElementById('deleteOverlay').classList.remove('open');
  document.body.style.overflow = '';
  deleteTargetId = null;
}
function closeDeleteOnOverlay(e) {
  if (e.target.id === 'deleteOverlay') closeDelete();
}
function confirmDelete() {
  const all = JSON.parse(localStorage.getItem('wh_articles') || '[]');
  const idx = all.findIndex(a => a.id === deleteTargetId);
  if (idx !== -1) { all.splice(idx, 1); localStorage.setItem('wh_articles', JSON.stringify(all)); }
  closeDelete();
  showToast('文章已刪除 ✓');
  loadArticles();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
